world:
  name: square_arena

agents:
  - id: A
    vehicle:
      name: combat_bot
      actuators: [motor_left, motor_right]
      sensors: [external_camera]
    task:
      task_name: go_to_point
      params:
        target_position: [1.5, 1.5]
        time_limit: 60.0
        success_threshold: 0.1
        collision_penalty: -50
        success_reward: 100
        time_penalty: -0.1
